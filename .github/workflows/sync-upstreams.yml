name: Sync from upstreams

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-upstreams
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Clone upstream sources
        run: |
          set -euo pipefail
          mkdir -p _sources
          git clone --depth 1                 https://github.com/Dictionarry-Hub/schema.git   _sources/schema
          git clone --depth 1 --branch v2     https://github.com/Dictionarry-Hub/database.git _sources/dictionarry
          git clone --depth 1 --branch stable https://github.com/Dumpstarr/Database.git      _sources/dumpstarr

      - name: Build merged snapshot
        run: python3 .github/scripts/build_merged.py

      - name: Drop legacy v1 directories (if present)
        run: |
          set -euo pipefail
          for d in custom_formats profiles regex_patterns media_management templates scripts; do
            if [ -d "$d" ]; then
              rm -rf "$d"
            fi
          done

      - name: Clean up source clones
        run: |
          set -euo pipefail
          rm -rf _sources
          echo "_sources/" > .gitignore.tmp
          if [ -f .gitignore ]; then
            grep -v '^_sources/$' .gitignore >> .gitignore.tmp || true
          fi
          mv .gitignore.tmp .gitignore

      - name: Show working tree state (debug)
        run: |
          echo "=== git status ==="
          git status
          echo ""
          echo "=== ls -la ==="
          ls -la
          echo ""
          echo "=== ls ops/ ==="
          ls -la ops/ 2>/dev/null || echo "(no ops/ dir)"

      - name: Commit & push
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DICT_SHA=$(python3 -c "import json; print(json.load(open('pcd.json'))['upstream']['dictionarry']['sha'])")
          DUMP_SHA=$(python3 -c "import json; print(json.load(open('pcd.json'))['upstream']['dumpstarr']['sha'])")
          git commit -m "chore(sync): Dictionarry ${DICT_SHA} + Dumpstarr ${DUMP_SHA}"
          git push